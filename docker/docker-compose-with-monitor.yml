version: '3.8'

services:
  mysql:
    image: mysql:8.0.35
    container_name: cinema-mysql
    environment:
      MYSQL_ROOT_PASSWORD: abcd1234
      MYSQL_DATABASE: cinema
      TZ: Asia/Seoul
    ports:
      - "3308:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - cinema-network

  redis:
    image: redis:7
    container_name: cinema-redis
    ports:
      - "6377:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - cinema-network

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
      - "8088:8088"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - ./influxdb_data:/var/lib/influxdb
    networks:
      - cinema-network

  grafana:
    image: bitnami/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    networks:
      - cinema-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  k6:
    image: loadimpact/k6:latest
    container_name: k6
    volumes:
      - ./k6-test:/scripts
    command: run /scripts/test.js --out influxdb=http://influxdb:8086/k6
    depends_on:
      - influxdb
    networks:
      - cinema-network

volumes:
  mysql_data:
  redis_data:
  influxdb_data:

networks:
  cinema-network:
    driver: bridge
