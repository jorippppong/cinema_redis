spring:
  profiles:
    include:
      - core
      - rds

# tomcat_threads 메트릭 볼 수 있게 설정
server:
  port: 8080
  tomcat:
    mbeanregistry:
      enabled: true

management:
  server:
    port: 9292
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-components: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99


